<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Nexus</title>
  <meta name="description" content="Join Nexus — share posts, connect with people, and explore your interests." />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

<div class="auth-page">
  <!-- Animated Background -->
  <div class="auth-bg">
    <div class="auth-bg-blob"></div>
    <div class="auth-bg-blob"></div>
    <div class="auth-bg-blob"></div>
  </div>

  <!-- Register Card -->
  <div class="glass-card auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🌐</div>
      <h1>Nexus</h1>
      <p>Join the community today</p>
    </div>

    <div class="auth-title">Create your account</div>
    <div class="auth-subtitle">It's free and always will be</div>

    <!-- Error Box -->
    <div class="auth-error" id="register-error"></div>

    <!-- Register Form -->
    <form class="auth-form" id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="reg-username">Username</label>
        <input
          class="form-input"
          type="text"
          id="reg-username"
          name="username"
          placeholder="Choose a unique username"
          autocomplete="username"
          minlength="3"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="reg-email"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input
          class="form-input"
          type="password"
          id="reg-password"
          name="password"
          placeholder="Minimum 6 characters"
          autocomplete="new-password"
          minlength="6"
          required
        />
        <!-- Password strength bars -->
        <div class="password-strength">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-confirm">Confirm Password</label>
        <input
          class="form-input"
          type="password"
          id="reg-confirm"
          name="confirm"
          placeholder="Re-enter your password"
          autocomplete="new-password"
          required
        />
      </div>

      <button class="btn btn-primary btn-full btn-lg" type="submit" id="register-btn">
        Create Account 🚀
      </button>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        Already have an account?
        <a href="/index.html">Sign in →</a>
      </div>
    </form>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
