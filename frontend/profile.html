<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Nexus</title>
  <meta name="description" content="View user profiles, posts, followers and following on Nexus." />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/feed.css" />
  <link rel="stylesheet" href="/css/profile.css" />
</head>
<body>

<!-- ══════════ NAVBAR ══════════ -->
<nav class="navbar">
  <a class="navbar-brand" href="/feed.html">🌐 Nexus</a>
  <div class="navbar-actions">
    <button class="btn btn-ghost btn-sm" id="nav-feed-btn">🏠 Feed</button>
    <div class="nav-avatar" id="nav-avatar" title="My Profile"></div>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Sign Out</button>
  </div>
</nav>

<!-- ══════════ PROFILE PAGE ══════════ -->
<main class="profile-page">

  <!-- Cover Banner -->
  <div class="profile-cover">
    <div class="cover-particles" id="cover-particles"></div>
  </div>

  <!-- Profile Header -->
  <div class="profile-header-wrap">
    <div class="profile-header">
      <!-- Avatar -->
      <div class="profile-avatar-wrap">
        <div class="avatar avatar-xl" id="profile-avatar">?</div>
      </div>

      <!-- Info -->
      <div class="profile-info">
        <h1 class="profile-username" id="profile-username">Loading...</h1>
        <p class="profile-bio" id="profile-bio"></p>
        <div class="profile-meta">
          <div class="profile-meta-item">
            📝 <strong id="stat-posts" data-count="0">0</strong> Posts
          </div>
          <div class="profile-meta-item">
            👥 <strong id="stat-followers" data-count="0">0</strong> Followers
          </div>
          <div class="profile-meta-item">
            ➡️ <strong id="stat-following" data-count="0">0</strong> Following
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="profile-actions" id="profile-actions">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- Posts Section -->
  <div class="profile-header-wrap">
    <div class="profile-stats-bar">
      <button class="stat-tab active">Posts</button>
    </div>
  </div>

  <!-- Posts Content -->
  <div class="profile-content" id="profile-content">
    <div id="posts-container">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <span>Loading posts...</span>
      </div>
    </div>
  </div>

</main>

<!-- ══════════ EDIT PROFILE MODAL ══════════ -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">✏️ Edit Profile</h2>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>

    <form class="modal-form" id="edit-profile-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="edit-bio">Bio</label>
        <textarea
          class="form-input"
          id="edit-bio"
          placeholder="Tell the world about yourself..."
          rows="3"
          maxlength="200"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-avatar">Avatar URL</label>
        <input
          class="form-input"
          type="url"
          id="edit-avatar"
          placeholder="https://example.com/your-avatar.jpg"
        />
        <span class="text-sm text-muted">Paste a direct link to your profile image</span>
      </div>

      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-primary" type="submit" id="save-profile-btn">Save Changes</button>
        <button class="btn btn-ghost" type="button" id="modal-close-btn-2">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>

<script>
  // Second cancel button
  document.getElementById('modal-close-btn-2')?.addEventListener('click', () => {
    document.getElementById('edit-modal')?.classList.remove('show');
  });

  // Generate cover particles
  const particlesEl = document.getElementById('cover-particles');
  if (particlesEl) {
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('span');
      s.style.left  = Math.random() * 100 + '%';
      s.style.top   = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.animationDuration = (2 + Math.random() * 2) + 's';
      particlesEl.appendChild(s);
    }
  }
</script>
</body>
</html>
