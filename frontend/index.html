<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus — Connect with the World</title>
  <meta name="description" content="Nexus is a mini social media platform to share posts, connect with people, and follow your interests." />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

<div class="auth-page">
  <!-- Animated Background -->
  <div class="auth-bg">
    <div class="auth-bg-blob"></div>
    <div class="auth-bg-blob"></div>
    <div class="auth-bg-blob"></div>
  </div>

  <!-- Login Card -->
  <div class="glass-card auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🌐</div>
      <h1>Nexus</h1>
      <p>Connect. Share. Discover.</p>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to your account</div>

    <!-- Error Box -->
    <div class="auth-error" id="login-error"></div>

    <!-- Login Form -->
    <form class="auth-form" id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-username">Username or Email</label>
        <input
          class="form-input"
          type="text"
          id="login-username"
          name="username"
          placeholder="Enter your username or email"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input
          class="form-input"
          type="password"
          id="login-password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
      </div>

      <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-btn">
        Sign In
      </button>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        Don't have an account?
        <a href="/register.html">Create one →</a>
      </div>
    </form>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
